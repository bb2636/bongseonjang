<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>주소 검색</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #fff;
    }
    #header {
      display: none;
      height: 48px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      align-items: center;
      padding: 0 12px;
    }
    #header.visible {
      display: flex;
    }
    #close-button {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #close-button svg {
      width: 24px;
      height: 24px;
    }
    #header-title {
      font-size: 16px;
      font-weight: 600;
      margin-left: 8px;
      color: #222;
    }
    #wrap {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #header.visible ~ #wrap {
      height: calc(100% - 48px);
    }
  </style>
</head>
<body>
  <div id="header">
    <button id="close-button" onclick="handleClose()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#222" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <span id="header-title">주소 검색</span>
  </div>
  <div id="wrap"></div>
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script>
    function handleClose() {
      if (window.mobileApp && typeof window.mobileApp.close === 'function') {
        window.mobileApp.close();
      } else {
        window.history.back();
      }
    }

    if (window.mobileApp) {
      document.getElementById('header').classList.add('visible');
    }

    new daum.Postcode({
      oncomplete: function(data) {
        var address = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
        var zonecode = data.zonecode;

        if (window.mobileApp && typeof window.mobileApp.postMessage === 'function') {
          window.mobileApp.postMessage({
            detail: {
              type: 'address-result',
              zonecode: zonecode,
              address: address
            }
          });
        } else {
          var resultUrl = window.location.origin + '/address-callback?' +
            'zonecode=' + encodeURIComponent(zonecode) +
            '&address=' + encodeURIComponent(address);
          window.location.href = resultUrl;
        }
      },
      width: '100%',
      height: '100%'
    }).embed(document.getElementById('wrap'));
  </script>
</body>
</html>
