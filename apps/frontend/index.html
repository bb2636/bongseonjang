<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <title>봉선장</title>
    <style>
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        z-index: 99999;
        overflow: hidden;
      }
      #initial-loader.hidden {
        display: none;
      }
      .skeleton-shimmer {
        background: linear-gradient(90deg, rgba(12,12,12,0.06) 25%, rgba(12,12,12,0.10) 50%, rgba(12,12,12,0.06) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s ease-in-out infinite;
      }
      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }
      .init-appbar {
        height: 48px;
        display: flex;
        align-items: center;
        padding: 0 16px;
        border-bottom: 1px solid rgba(12,12,12,0.06);
      }
      .init-appbar__logo {
        width: 80px;
        height: 24px;
        border-radius: 4px;
      }
      .init-tabs {
        display: flex;
        gap: 16px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(12,12,12,0.06);
      }
      .init-tab {
        width: 48px;
        height: 16px;
        border-radius: 4px;
      }
      .init-hero {
        width: 100%;
        height: 247px;
      }
      .init-categories {
        display: flex;
        gap: 12px;
        padding: 16px;
        overflow: hidden;
      }
      .init-category {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .init-category__icon {
        width: 48px;
        height: 48px;
        border-radius: 50%;
      }
      .init-category__text {
        width: 40px;
        height: 12px;
        border-radius: 4px;
      }
      .init-section {
        padding: 16px;
      }
      .init-section__header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .init-section__title {
        width: 120px;
        height: 20px;
        border-radius: 4px;
      }
      .init-section__more {
        width: 60px;
        height: 14px;
        border-radius: 4px;
      }
      .init-products {
        display: flex;
        gap: 12px;
        overflow: hidden;
      }
      .init-product {
        flex-shrink: 0;
        width: 140px;
      }
      .init-product__image {
        width: 140px;
        height: 140px;
        border-radius: 8px;
        margin-bottom: 8px;
      }
      .init-product__title {
        width: 100%;
        height: 14px;
        border-radius: 4px;
        margin-bottom: 6px;
      }
      .init-product__price {
        width: 70%;
        height: 16px;
        border-radius: 4px;
      }
      .init-bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 60px;
        background: #fff;
        border-top: 1px solid rgba(12,12,12,0.06);
        display: flex;
        justify-content: space-around;
        align-items: center;
        padding: 8px 0;
      }
      .init-nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .init-nav-item__icon {
        width: 24px;
        height: 24px;
        border-radius: 4px;
      }
      .init-nav-item__text {
        width: 32px;
        height: 10px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>

      </div>
      <div class="init-section">

        <div class="init-products">

      </div>
      <div class="init-bottom-nav">

  </body>
</html>
