apply plugin: 'com.android.application'

def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def versionPropsFile = file("version.properties")
def versionProps = new Properties()
if (versionPropsFile.exists()) {
    versionProps.load(new FileInputStream(versionPropsFile))
} else {
    versionProps['versionCode'] = '1'
    versionProps['versionName'] = '1.0.0'
}
def appVersionCode = (versionProps['versionCode'] as String).toInteger()
def appVersionName = versionProps['versionName'] as String

android {
    namespace "com.bongkru.app"
    compileSdk project.hasProperty('compileSdkVersion') ? rootProject.ext.compileSdkVersion : 35
    defaultConfig {
        applicationId "com.bongkru.app"
        minSdkVersion project.hasProperty('minSdkVersion') ? rootProject.ext.minSdkVersion : 23
        targetSdkVersion project.hasProperty('targetSdkVersion') ? rootProject.ext.targetSdkVersion : 35
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (keystorePropertiesFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

tasks.register('printSigningSha') {
    doLast {
        def variants = ['debug', 'release']
        variants.each { variantName ->
            def config = android.signingConfigs.findByName(variantName)
            if (config?.storeFile?.exists()) {
                println "\n========== ${variantName.toUpperCase()} SIGNING ==========="
                println "Store: ${config.storeFile.absolutePath}"
                println "Alias: ${config.keyAlias}"
                def proc = ['keytool', '-list', '-v',
                            '-keystore', config.storeFile.absolutePath,
                            '-alias', config.keyAlias,
                            '-storepass', config.storePassword].execute()
                proc.waitFor()
                proc.in.eachLine { line ->
                    if (line.contains('SHA1:') || line.contains('SHA-256:') || line.contains('SHA256:')) {
                        println line.trim()
                    }
                }
            }
        }
    }
}

tasks.register('bumpVersion') {
    doLast {
        if (!versionPropsFile.exists()) return
        def props = new Properties()
        props.load(new FileInputStream(versionPropsFile))
        def oldCode = (props['versionCode'] as String).toInteger()
        def oldName = props['versionName'] as String
        def newCode = oldCode + 1
        def parts = oldName.split('\\.').collect { it.toInteger() }
        while (parts.size() < 3) parts.add(0)
        parts[2] = parts[2] + 1
        def newName = parts.join('.')
        props['versionCode'] = newCode.toString()
        props['versionName'] = newName
        props.store(new FileOutputStream(versionPropsFile), null)
        println "\n========== VERSION BUMP ==========="
        println "versionCode: ${oldCode} -> ${newCode}"
        println "versionName: ${oldName} -> ${newName}"
        println "(next build will use the bumped version)"
    }
}

afterEvaluate {
    tasks.matching { it.name == 'assembleRelease' || it.name == 'bundleRelease' }.all { task ->
        task.finalizedBy 'printSigningSha', 'bumpVersion'
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

def capBuildFile = file('capacitor.build.gradle')
if (capBuildFile.exists()) {
    def safeDeps = []
    capBuildFile.eachLine { line ->
        def m = (line =~ /implementation\s+project\(':(.+?)'\)/)
        if (m.find()) {
            if (findProject(":${m.group(1)}") != null) {
                safeDeps.add(m.group(1))
            } else {
                logger.warn("Skipping missing project :${m.group(1)}")
            }
        }
    }
    dependencies {
        safeDeps.each { name ->
            implementation project(":${name}")
        }
    }
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
